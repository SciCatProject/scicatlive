name: Create release

on:  # yamllint disable-line rule:truthy
  pull_request:
    branches:
      - main

jobs:
  create_release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Test OCI Bundle (PR Dry Run)
        run: |
          # Use your Bash substitution to lower the path
          RAW_PATH="ghcr.io/${GITHUB_REPOSITORY}"
          IMAGE_PATH="${RAW_PATH,,}"
          PR_TAG="pr-${{ github.event.pull_request.number }}"
          echo "Verifying OCI bundle for ${IMAGE_PATH}:${PR_TAG}"
          docker compose publish \
            --app \
            --resolve-image-digests \
            --with-env \
            --yes \
            "${IMAGE_PATH}:${PR_TAG}"
