services:
  backend:
    image: ghcr.io/scicatproject/backend-next:v4.28.0
    depends_on:
      mongodb:
        condition: service_started
    configs:
      - source: backend_v4_functional_accounts_json
        target: /home/node/app/functionalAccounts.json
      - source: entrypoints_loop_entrypoints_sh
        target: /usr/local/bin/loop_entrypoints.sh
        mode: 0555
      - source: backend_v4_db_migration_sh
        target: /docker-entrypoints/10.sh
        mode: 0555
    entrypoint:
      - loop_entrypoints.sh
      - docker-entrypoint.sh
    command: node dist/main
    labels:
      # Adding a label for traefik to learn which port to look for a service on
      - traefik.http.services.backend.loadbalancer.server.port=3000
    env_file:
      - ./config/.env
    healthcheck:
      test: wget --spider -Y off 'http://127.0.0.1:3000/api/v3/health'
      start_period: 5s
      interval: 30s
      timeout: 10s
      retries: 5
    restart: on-failure

configs:
  backend_v4_functional_accounts_json:
    file: ./config/functionalAccounts.json
  backend_v4_db_migration_sh:
    file: ./entrypoints/db_migration.sh
