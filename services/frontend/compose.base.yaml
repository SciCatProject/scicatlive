services:
  frontend:
    image: ghcr.io/scicatproject/frontend:v5.4.0
    depends_on:
      backend:
        condition: service_healthy
    volumes:
      - ./config/config.json:${CONFIG_DIR}/config.override.json
    labels:
      - traefik.http.routers.frontend.rule=Host(`localhost`)
      # Adding a label for traefik to learn which port to look for a service on
      - traefik.http.services.frontend.loadbalancer.server.port=80
    healthcheck:
      test: wget --spider -Y off 'http://127.0.0.1:80'
      start_period: 5s
      interval: 30s
      timeout: 10s
      retries: 5
    restart: on-failure
