services:
  frontend:
    extends:
      file: ${PWD}/services/compose.dev.yaml
      service: node-app-from-remote
    build:
      target: builder
    environment:
      CONFIG_DIR: ${WORKDIR}/src/assets
      CHROME_BIN: /usr/bin/chromium
    configs:
      - source: frontend_dev_merge_json_sh
        target: /docker-entrypoints/10.sh
        mode: 0555
      - source: frontend_dev_add_chrome_sh
        target: /docker-entrypoints/20.sh
        mode: 0555
    post_start: !reset null

volumes:
  frontend_dev:
    driver: local

configs:
  frontend_dev_merge_json_sh:
    file: ${PWD}/entrypoints/merge_json.sh
  frontend_dev_add_chrome_sh:
    file: ${PWD}/entrypoints/add_chrome.sh
