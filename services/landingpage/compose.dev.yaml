services:
  landingpage:
    extends:
      file: ${PWD}/services/compose.dev.yaml
      service: node-app-from-remote
    build:
      target: builder
    environment:
      CONFIG_DIR: ${WORKDIR:-/home/node/app}/src/assets
      CHROME_BIN: /usr/bin/chromium
    configs:
      - source: landingpage_dev_merge_json_sh
        target: /docker-entrypoints/10.sh
        mode: 0555
      - source: landingpage_dev_add_chrome_sh
        target: /docker-entrypoints/20.sh
        mode: 0555

volumes:
  landingpage_dev:
    driver: local

configs:
  landingpage_dev_merge_json_sh:
    file: ${PWD}/entrypoints/merge_json.sh
  landingpage_dev_add_chrome_sh:
    file: ${PWD}/entrypoints/add_chrome.sh
