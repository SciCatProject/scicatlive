services:
  ldap:
    image: glauth/glauth:v2.5.0
    configs:
      - source: ldap_glauth_conf
        target: /app/config/config.cfg
    labels:
      # Adding a label to keep this service out of traefik
      - traefik.enable=false
    post_start:
      # "Install" busybox netcat for healthchecks
      - command: /usr/bin/cp /bin/sh /bin/nc
    healthcheck:
      test: /bin/nc -zv 127.0.0.1 3893
      start_period: 5s
      interval: 10s
      timeout: 10s
      retries: 5
    restart: on-failure

configs:
  ldap_glauth_conf:
    file: ./config/glauth.conf
